<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef6e4">
<title>เรียนรู้พาสนุก 🎈 3D • ก-ฮ • สัตว์ • ยานพาหนะ</title>
<style>
  :root{
    --bg1:#fff7ec; --bg2:#ffe7c7; --bg3:#ffd9e6;
    --card:#ffffff; --ink:#3a2e2a; --muted:#9a8a80;
    --shadow-lg:0 18px 40px -12px rgba(120,80,40,.35);
    --shadow-sm:0 8px 18px -6px rgba(120,80,40,.28);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Sarabun","Kanit","Segoe UI",system-ui,sans-serif;
    color:var(--ink); min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:12px; overflow-x:hidden; position:relative;
    background:
      radial-gradient(1200px 600px at 15% -10%, #fff 0%, transparent 55%),
      radial-gradient(900px 500px at 110% 10%, var(--bg3) 0%, transparent 50%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
  }
  /* floating depth blobs */
  .blob{position:fixed; border-radius:50%; filter:blur(6px); opacity:.35; z-index:0; pointer-events:none;
    animation:float 9s ease-in-out infinite;}
  .blob.b1{width:120px;height:120px;background:#ffd166;top:12%;left:-30px;}
  .blob.b2{width:90px;height:90px;background:#74c0fc;top:60%;right:-20px;animation-delay:-3s;}
  .blob.b3{width:70px;height:70px;background:#8ce99a;bottom:8%;left:10%;animation-delay:-5s;}
  @keyframes float{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(-22px) translateX(10px);}}

  header,main{width:100%; max-width:1120px; position:relative; z-index:1;}
  header{text-align:center;}
  h1{
    font-size:clamp(1.5rem,6vw,2.6rem); margin:.25em 0 .1em; font-weight:800; letter-spacing:.5px;
    color:#5a3d2b; text-shadow:0 2px 0 #fff, 0 4px 10px rgba(180,120,60,.35);
  }
  .subtitle{color:var(--muted); font-size:clamp(.8rem,3.3vw,1rem); margin:0 0 12px;}

  /* ---- chunky 3D tabs ---- */
  .tabs{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;}
  .tab{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(.85rem,3.6vw,1.05rem); padding:11px 20px; border-radius:16px;
    color:#7a5a3a; background:linear-gradient(#ffffff,#ffeccd);
    box-shadow:0 6px 0 #e7c79a, var(--shadow-sm); transition:transform .08s, box-shadow .08s;
    transform:translateZ(0);
  }
  .tab:active{transform:translateY(4px); box-shadow:0 2px 0 #e7c79a, var(--shadow-sm);}
  .tab.active{color:#fff; background:linear-gradient(#ff9bb3,#ff6f91); box-shadow:0 6px 0 #d94f74, var(--shadow-sm);}

  .subtabs{display:flex; gap:10px; justify-content:center; margin-bottom:16px;}
  .subtab{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(.8rem,3.4vw,1rem); padding:9px 20px; border-radius:14px;
    color:#3f6e8c; background:linear-gradient(#ffffff,#e6f2ff);
    box-shadow:0 5px 0 #b7d6f0, var(--shadow-sm); transition:transform .08s, box-shadow .08s;
  }
  .subtab:active{transform:translateY(3px); box-shadow:0 2px 0 #b7d6f0, var(--shadow-sm);}
  .subtab.active{color:#fff; background:linear-gradient(#7db8ff,#4a97dd); box-shadow:0 5px 0 #3877b3, var(--shadow-sm);}

  .cat-panel{display:none;}
  .cat-panel.active{display:block;}
  .mode-panel{display:none; animation:fade .35s ease;}
  .mode-panel.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

  /* ---- 3D learn grid ---- */
  .grid{
    display:grid; gap:16px 14px; perspective:1000px;
    grid-template-columns:repeat(auto-fill,minmax(104px,1fr));
    padding:6px 2px 30px;
  }
  .card{
    --c:#ffd166; --e:#e0ad3f;
    border:none; cursor:pointer; font-family:inherit; border-radius:22px;
    padding:14px 6px 12px; color:#3a2e2a;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.85), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, var(--c), color-mix(in srgb, var(--c) 78%, #000 4%));
    box-shadow:0 10px 0 var(--e), 0 16px 22px -8px rgba(90,60,30,.45), inset 0 2px 2px rgba(255,255,255,.7);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    transition:transform .1s cubic-bezier(.2,.8,.3,1), box-shadow .1s;
    transform-style:preserve-3d;
  }
  .card:hover{transform:translateY(-3px) rotateX(6deg);}
  .card:active{transform:translateY(7px) rotateX(0);
    box-shadow:0 3px 0 var(--e), 0 8px 12px -6px rgba(90,60,30,.45), inset 0 2px 2px rgba(255,255,255,.7);}
  .card.pop{animation:pop .45s;}
  @keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.14) translateY(-4px);}100%{transform:scale(1);}}
  .card .big{font-size:clamp(2.1rem,9vw,2.7rem); font-weight:800; line-height:1; text-shadow:0 2px 0 rgba(255,255,255,.55);}
  .card .emoji{font-size:clamp(1.9rem,8.5vw,2.7rem); line-height:1; filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));}
  .card .label{font-size:clamp(.72rem,3.2vw,.92rem); font-weight:700; text-align:center; color:#4a3a2e;}

  /* ---- 3D game ---- */
  .game{
    background:linear-gradient(180deg,#ffffff,#fff4e2);
    border-radius:32px; padding:22px 18px 28px; text-align:center; max-width:580px; margin:0 auto;
    box-shadow:var(--shadow-lg), inset 0 2px 3px rgba(255,255,255,.9);
  }
  .score{display:flex; justify-content:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
  .badge{
    min-width:88px; padding:10px 14px; border-radius:18px; font-weight:800;
    background:linear-gradient(180deg,#fff,#ffe9c9); box-shadow:0 6px 0 #ecc891, var(--shadow-sm);
  }
  .badge.streak{background:linear-gradient(180deg,#fff,#ffe0e6); box-shadow:0 6px 0 #f3b9c6, var(--shadow-sm);}
  .badge.best{background:linear-gradient(180deg,#fff,#fff2c2); box-shadow:0 6px 0 #ecd679, var(--shadow-sm);}
  .badge .lbl{font-size:.7rem; color:var(--muted); font-weight:700; display:block; margin-bottom:2px;}
  .badge .v{font-size:clamp(1.2rem,5vw,1.5rem); line-height:1;}
  .prompt{color:var(--muted); font-weight:700; margin:2px 0 8px; font-size:clamp(.9rem,3.8vw,1.05rem);}
  .play-btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(1.1rem,5vw,1.5rem); color:#fff; padding:16px 28px; border-radius:22px;
    background:linear-gradient(180deg,#8fc4ff,#4a97dd);
    box-shadow:0 8px 0 #3877b3, var(--shadow-sm); margin:4px 0 20px;
    transition:transform .08s, box-shadow .08s;
  }
  .play-btn:active{transform:translateY(5px); box-shadow:0 3px 0 #3877b3, var(--shadow-sm);}
  .choices{display:grid; grid-template-columns:1fr 1fr; gap:16px; perspective:1000px;}
  .choice{
    --c:#ffffff; --e:#e7c79a;
    border:none; cursor:pointer; font-family:inherit; border-radius:24px; color:#3a2e2a;
    background:radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%), linear-gradient(180deg,var(--c),#fff2df);
    box-shadow:0 10px 0 var(--e), 0 16px 22px -8px rgba(90,60,30,.4), inset 0 2px 2px rgba(255,255,255,.8);
    padding:20px 8px; display:flex; flex-direction:column; align-items:center; gap:4px;
    min-height:112px; justify-content:center; transition:transform .1s, box-shadow .1s;
    transform-style:preserve-3d;
  }
  .choice:hover{transform:translateY(-3px) rotateX(6deg);}
  .choice:active{transform:translateY(7px); box-shadow:0 3px 0 var(--e), 0 8px 12px -6px rgba(90,60,30,.4), inset 0 2px 2px rgba(255,255,255,.8);}
  .choice .big{font-size:clamp(2.4rem,11vw,3.2rem); font-weight:800; text-shadow:0 2px 0 rgba(255,255,255,.6);}
  .choice .emoji{font-size:clamp(2.2rem,10vw,3rem); filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));}
  .choice.correct{--c:#b6f5c2; --e:#5cc46e; animation:pop .45s;}
  .choice.wrong{--c:#ffc2c2; --e:#e06666;}
  .choice:disabled{cursor:default;}
  .feedback{min-height:32px; font-size:clamp(1.15rem,5vw,1.45rem); font-weight:800; margin-top:16px;}

  footer{color:var(--muted); font-size:.76rem; text-align:center; padding:16px 0 8px; position:relative; z-index:1;}

  /* ---- overlay ---- */
  .overlay{
    position:fixed; inset:0; z-index:60; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center; padding:20px;
    background:radial-gradient(700px 500px at 50% 30%, #fff, var(--bg2));
  }
  .overlay .logo{font-size:4.4rem; filter:drop-shadow(0 8px 10px rgba(0,0,0,.2)); animation:spin3d 4s ease-in-out infinite;}
  @keyframes spin3d{0%,100%{transform:rotateY(0) translateY(0);}50%{transform:rotateY(180deg) translateY(-10px);}}
  .overlay h2{font-size:clamp(1.4rem,6vw,2.1rem); margin:0; color:#5a3d2b; text-shadow:0 2px 0 #fff;}
  .overlay p{color:var(--muted); max-width:340px; margin:0;}
  .start-btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:1.4rem; color:#fff;
    padding:20px 42px; border-radius:26px; background:linear-gradient(180deg,#ff9bb3,#ff6f91);
    box-shadow:0 10px 0 #d94f74, var(--shadow-lg); animation:bounce 1.4s infinite;
  }
  .start-btn:active{transform:translateY(6px); box-shadow:0 4px 0 #d94f74, var(--shadow-lg);}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
  .hidden{display:none !important;}

  /* ---- confetti ---- */
  .confetti{position:fixed; z-index:80; pointer-events:none; font-size:1.6rem; will-change:transform,opacity;}
  @keyframes fall{
    0%{transform:translateY(-10vh) rotate(0); opacity:1;}
    100%{transform:translateY(110vh) rotate(540deg); opacity:0;}
  }

  /* ---- 3D model viewer ---- */
  .viewer{position:fixed; inset:0; z-index:100; display:none; touch-action:none; overflow:hidden;
    background:radial-gradient(1000px 800px at 50% 35%, #ffffff 0%, #ffe9c9 55%, #ffd9e6 100%);}
  .viewer.show{display:block; animation:fade .25s ease;}
  .viewer canvas{display:block; width:100%; height:100%;}
  .viewer .vname{position:absolute; left:0; right:0; top:18px; text-align:center; pointer-events:none;
    font-weight:800; font-size:clamp(1.5rem,7vw,2.4rem); color:#5a3d2b; text-shadow:0 2px 0 #fff, 0 4px 12px rgba(180,120,60,.3);}
  .viewer .vhint{position:absolute; left:0; right:0; bottom:24px; text-align:center; pointer-events:none;
    font-weight:800; font-size:clamp(.85rem,4vw,1.1rem); color:#8a6a48; text-shadow:0 2px 0 #fff; opacity:.9;}
  .viewer .vclose{position:absolute; top:14px; right:16px; z-index:2; width:52px; height:52px; border:none; cursor:pointer;
    border-radius:50%; font-size:1.6rem; color:#fff; background:linear-gradient(180deg,#ff9bb3,#ff6f91);
    box-shadow:0 6px 0 #d94f74, var(--shadow-sm); transition:transform .08s, box-shadow .08s;}
  .viewer .vclose:active{transform:translateY(4px); box-shadow:0 2px 0 #d94f74, var(--shadow-sm);}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<div class="overlay" id="overlay">
  <div class="logo">🎲</div>
  <h2>เรียนรู้พาสนุก 3D</h2>
  <p>แตะปุ่มด้านล่างเพื่อเริ่ม แล้วมาเรียน ก-ฮ สัตว์ และยานพาหนะกันเลย!</p>
  <button class="start-btn" id="startBtn">▶ เริ่มเล่น</button>
</div>

<header>
  <h1>เรียนรู้พาสนุก 🎈</h1>
  <p class="subtitle">แตะเพื่อฟังเสียง • เล่นเกมทายเสียงสะสมคะแนน</p>
  <div class="tabs" id="catTabs"></div>
  <div class="subtabs">
    <button class="subtab active" data-mode="learn">📖 เรียนรู้</button>
    <button class="subtab" data-mode="game">🎮 ทายเสียง</button>
  </div>
</header>

<main id="main"></main>
<footer>สร้างเพื่อการเรียนรู้ • เสียงในเครื่อง (Web Speech) • เล่นได้ทุกอุปกรณ์</footer>

<div class="viewer" id="viewer">
  <button class="vclose" id="vclose" aria-label="ปิด">✕</button>
  <div class="vname" id="vname"></div>
  <div class="vhint">👆 ลากเพื่อหมุน 360° • แตะที่ตัวเพื่อฟังเสียง • แตะขอบเพื่อปิด</div>
</div>

  {n:"รถไฟความเร็วสูง",e:"🚄"},{n:"รถไฟฟ้า",e:"🚈"},{n:"รถไฟใต้ดิน",e:"🚇"},{n:"รถราง",e:"🚋"},
  {n:"โมโนเรล",e:"🚝"},{n:"กระเช้าลอยฟ้า",e:"🚠"},{n:"กระเช้าไฟฟ้า",e:"🚡"},{n:"เครื่องบิน",e:"✈️"},
  {n:"เครื่องบินเล็ก",e:"🛩️"},{n:"เฮลิคอปเตอร์",e:"🚁"},{n:"จรวด",e:"🚀"},{n:"จานบิน",e:"🛸"},
  {n:"ร่มชูชีพ",e:"🪂"},{n:"เรือใบ",e:"⛵"},{n:"เรือเร็ว",e:"🚤"},{n:"เรือแคนู",e:"🛶"},
  {n:"เรือข้ามฟาก",e:"⛴️"},{n:"เรือใหญ่",e:"🚢"},
];

const norm = {
  letters: LETTERS.map(L=>({big:L.c, emoji:L.e, label:L.c+" "+L.w, say:L.say, key:L.c})),
  animals: ANIMALS.map(A=>({big:A.e, emoji:A.e, label:A.n, say:A.n, key:A.n})),
  vehicles: VEHICLES.map(V=>({big:V.e, emoji:V.e, label:V.n, say:V.n, key:V.n})),
};

const CATEGORIES = [
  {id:"letters", label:"ก-ฮ", icon:"📖", type:"letter", prompt:"ฟังเสียงแล้วเลือกตัวอักษรที่ถูก"},
  {id:"animals", label:"สัตว์", icon:"🐘", type:"pic", prompt:"ฟังชื่อสัตว์แล้วเลือกรูปที่ถูก"},
  {id:"vehicles", label:"ยานพาหนะ", icon:"🚗", type:"pic", prompt:"ฟังชื่อแล้วเลือกยานพาหนะที่ถูก"},
];

const CARD_COLORS = ["#ffd166","#ff9bb3","#8ce99a","#7db8ff","#c3a6ff","#ffb27d","#7fe0d9","#ffe08a"]
  .map(c=>c); // cycled

/* ================= AUDIO / SPEECH ================= */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
/* short punchy sound effect (loud) */
function sfx(type){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  const o = audioCtx.createOscillator();
  o.connect(g);
  if(type==="pop"){ o.type="triangle"; o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(940,t+.12);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.9,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.22); o.start(t); o.stop(t+.24); }
  else if(type==="boing"){ o.type="sine"; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(660,t+.08); o.frequency.exponentialRampToValueAtTime(180,t+.32);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.9,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.4); o.start(t); o.stop(t+.42); }
  else { o.type="square"; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(120,t+.2);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.6,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.25); o.start(t); o.stop(t+.27); }
}

let thaiVoice = null;
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  thaiVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith("th")) || null;
}
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, withPop){
  if(withPop) sfx("pop");
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang="th-TH"; if(thaiVoice) u.voice=thaiVoice; u.rate=0.85; u.pitch=1.1; u.volume=1;  // loudest
  speechSynthesis.speak(u);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ================= CONFETTI ================= */
function celebrate(big){
  const emojis = big ? ["🌟","🎉","⭐","✨","🏆","🎊"] : ["⭐","✨","🎉","🌟"];
  const n = big ? 26 : 14;
  for(let i=0;i<n;i++){
    const s = document.createElement("div");
    s.className="confetti"; s.textContent=emojis[(Math.random()*emojis.length)|0];
    s.style.left=(Math.random()*100)+"vw";
    s.style.top="-6vh";
    const dur = 1.6+Math.random()*1.4;
    s.style.animation=`fall ${dur}s linear forwards`;
    s.style.fontSize=(1.1+Math.random()*1.4)+"rem";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), dur*1000+100);
  }
}

/* ================= STATE ================= */
const games = {};
let activeCat = CATEGORIES[0].id;
let activeMode = "learn";
function bestKey(id){ return "best_"+id; }
function getBest(id){ return parseInt(localStorage.getItem(bestKey(id))||"0",10); }
function setBest(id,v){ localStorage.setItem(bestKey(id), String(v)); }

/* ================= BUILD UI ================= */
const catTabs = document.getElementById("catTabs");
const mainEl = document.getElementById("main");

CATEGORIES.forEach((cat, idx)=>{
  const tab = document.createElement("button");
  tab.className = "tab"+(idx===0?" active":"");
  tab.dataset.cat = cat.id; tab.textContent = cat.icon+" "+cat.label;
  tab.addEventListener("click", ()=>selectCat(cat.id));
  catTabs.appendChild(tab);

  const panel = document.createElement("section");
  panel.className = "cat-panel"+(idx===0?" active":""); panel.id = "cat-"+cat.id;

  // learn grid
  const learn = document.createElement("div");
  learn.className = "mode-panel learn active";
  const grid = document.createElement("div"); grid.className="grid";
  norm[cat.id].forEach((item,i)=>{
    const b = document.createElement("button");
    b.className="card";
    const col = CARD_COLORS[i % CARD_COLORS.length];
    b.style.setProperty("--c", col);
    b.style.setProperty("--e", "color-mix(in srgb, "+col+" 65%, #7a5a2a)");
    if(cat.type==="letter"){
      b.innerHTML = `<span class="emoji">${item.emoji}</span><span class="big">${item.big}</span><span class="label">${item.label}</span>`;
    }else{
      b.innerHTML = `<span class="emoji" style="font-size:clamp(2.6rem,12vw,3.6rem)">${item.emoji}</span><span class="label">${item.label}</span>`;
    }
    b.addEventListener("click", ()=>{ b.classList.remove("pop"); void b.offsetWidth; b.classList.add("pop"); Viewer.open(item, cat); });
    grid.appendChild(b);
  });
  learn.appendChild(grid);

  // game
  const game = document.createElement("div");
  game.className = "mode-panel game-panel";
  game.innerHTML = `
    <div class="game">
      <div class="score">
        <div class="badge"><span class="lbl">คะแนน</span><span class="v score-v">0</span></div>
        <div class="badge streak"><span class="lbl">ต่อเนื่อง 🔥</span><span class="v streak-v">0</span></div>
        <div class="badge best"><span class="lbl">สูงสุด 🏆</span><span class="v best-v">0</span></div>
      </div>
      <p class="prompt">${cat.prompt}</p>
      <button class="play-btn">🔊 ฟังเสียงอีกครั้ง</button>
      <div class="choices"></div>
      <div class="feedback"></div>
    </div>`;

  panel.appendChild(learn); panel.appendChild(game); mainEl.appendChild(panel);

  games[cat.id] = {
    cat, started:false, answered:false, current:null, score:0, streak:0,
    choicesEl: game.querySelector(".choices"),
    feedbackEl: game.querySelector(".feedback"),
    scoreEl: game.querySelector(".score-v"),
    streakEl: game.querySelector(".streak-v"),
    bestEl: game.querySelector(".best-v"),
  };
  games[cat.id].bestEl.textContent = getBest(cat.id);
  game.querySelector(".play-btn").addEventListener("click", ()=>{ if(games[cat.id].current) speak(games[cat.id].current.say); });
});

/* ================= GAME LOGIC ================= */
function startRound(catId){
  const g = games[catId]; g.answered=false; g.feedbackEl.textContent="";
  const pool = shuffle(norm[catId]);
  g.current = pool[0];
  const options = shuffle([pool[0],pool[1],pool[2],pool[3]]);
  g.choicesEl.innerHTML="";
  options.forEach(item=>{
    const b=document.createElement("button"); b.className="choice"; b.dataset.key=item.key;
    if(g.cat.type==="letter"){
      b.innerHTML = `<span class="big">${item.big}</span><span class="emoji" style="font-size:clamp(1.5rem,6vw,2rem)">${item.emoji}</span>`;
    }else{
      b.innerHTML = `<span class="emoji">${item.emoji}</span>`;
    }
    b.addEventListener("click", ()=>choose(catId,b,item));
    g.choicesEl.appendChild(b);
  });
  setTimeout(()=>speak(g.current.say), 350);
}

function choose(catId, btn, item){
  const g = games[catId];
  if(g.answered || btn.disabled) return;
  const buttons=[...g.choicesEl.children];
  if(item.key === g.current.key){
    g.answered=true; btn.classList.add("correct");
    const gain = 10 + g.streak*2;         // streak bonus
    g.score += gain; g.streak++;
    buttons.forEach(b=>b.disabled=true);
    const prevBest = getBest(catId);
    let newBest=false;
    if(g.score > prevBest){ setBest(catId, g.score); g.bestEl.textContent=g.score; newBest=true; }
    if(newBest && g.score>0 && prevBest>0){
      g.feedbackEl.textContent="ทำลายสถิติ! 🏆 +"+gain;
      celebrate(true); speak("เยี่ยมมาก ทำลายสถิติ");
    }else{
      g.feedbackEl.textContent="เก่งมาก! 🎉 "+g.current.label+"  +"+gain;
      celebrate(false); speak("ถูกต้อง เก่งมาก");
    }
    setTimeout(()=>startRound(catId), 1600);
  }else{
    btn.classList.add("wrong"); btn.disabled=true; g.streak=0;
    g.feedbackEl.textContent="ลองอีกครั้งนะ 💪"; speak("ลอง อีก ครั้ง");
  }
  g.scoreEl.textContent=g.score; g.streakEl.textContent=g.streak;
}

/* ================= NAV ================= */
function selectCat(catId){
  activeCat=catId;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.cat===catId));
  document.querySelectorAll(".cat-panel").forEach(p=>p.classList.toggle("active", p.id==="cat-"+catId));
  applyMode();
}
function applyMode(){
  const panel=document.getElementById("cat-"+activeCat);
  panel.querySelector(".learn").classList.toggle("active", activeMode==="learn");
  panel.querySelector(".game-panel").classList.toggle("active", activeMode==="game");
  if(activeMode==="game"){ const g=games[activeCat]; if(!g.started){ g.started=true; startRound(activeCat); } }
}
document.querySelectorAll(".subtab").forEach(st=>{
  st.addEventListener("click", ()=>{
    activeMode=st.dataset.mode;
    document.querySelectorAll(".subtab").forEach(x=>x.classList.toggle("active", x===st));
    applyMode();
  });
});

/* ================= 3D MODEL VIEWER ================= */
const Viewer = (function(){
  const el = document.getElementById("viewer");
  const nameEl = document.getElementById("vname");
  let renderer, scene, camera, mesh, raf, ready=false;
  let baseY=0, t0=0, behavior="spin", cur=null, reactAt=-9, autoSpin=0;
  let dragging=false, moved=false, lastX=0, lastY=0, downX=0, downY=0;
  const BOX=2.6;

  function makeFaceTexture(emoji, col){
    const s=512, c=document.createElement("canvas"); c.width=c.height=s;
    const x=c.getContext("2d");
    // pastel rounded card
    const r=90; x.fillStyle=col;
    x.beginPath();
    x.moveTo(r,20); x.arcTo(s-20,20,s-20,s-20,r); x.arcTo(s-20,s-20,20,s-20,r);
    x.arcTo(20,s-20,20,20,r); x.arcTo(20,20,s-20,20,r); x.closePath(); x.fill();
    // glossy highlight
    const grd=x.createLinearGradient(0,20,0,s/2); grd.addColorStop(0,"rgba(255,255,255,.55)"); grd.addColorStop(1,"rgba(255,255,255,0)");
    x.fillStyle=grd; x.fill();
    // emoji
    x.font='300px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    x.textAlign="center"; x.textBaseline="middle";
    x.fillText(emoji, s/2, s/2+20);
    const tex=new THREE.CanvasTexture(c); tex.anisotropy=4; return tex;
  }

  function init(){
    renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    el.insertBefore(renderer.domElement, el.firstChild);
    scene=new THREE.Scene();
    camera=new THREE.PerspectiveCamera(45,1,0.1,100);
    scene.add(new THREE.AmbientLight(0xffffff,0.9));
    const d=new THREE.DirectionalLight(0xffffff,0.7); d.position.set(-3,5,6); scene.add(d);
    // pointer handlers
    const cv=renderer.domElement;
    cv.addEventListener("pointerdown", onDown);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("resize", ()=>{ if(ready) fit(); });
    ready=true;
  }

  function fit(){
    const w=el.clientWidth, h=el.clientHeight, aspect=w/h;
    renderer.setSize(w,h); camera.aspect=aspect;
    const vfov=camera.fov*Math.PI/180;
    const distH=(BOX*0.56)/Math.tan(vfov/2);
    const distW=(BOX*0.56)/(Math.tan(vfov/2)*aspect);
    camera.position.z=Math.max(distH,distW,3.0);
    camera.updateProjectionMatrix();
  }

  function ndc(ev){
    const rect=renderer.domElement.getBoundingClientRect();
    return {x:((ev.clientX-rect.left)/rect.width)*2-1, y:-((ev.clientY-rect.top)/rect.height)*2+1};
  }
  function hitMesh(ev){
    const p=ndc(ev); const rc=new THREE.Raycaster(); rc.setFromCamera(new THREE.Vector2(p.x,p.y),camera);
    return rc.intersectObject(mesh).length>0;
  }
  function onDown(ev){ if(!el.classList.contains("show"))return; dragging=true; moved=false; lastX=downX=ev.clientX; lastY=downY=ev.clientY; }
  function onMove(ev){
    if(!dragging)return;
    const dx=ev.clientX-lastX, dy=ev.clientY-lastY; lastX=ev.clientX; lastY=ev.clientY;
    mesh.rotation.y+=dx*0.01; mesh.rotation.x+=dy*0.01;
    if(Math.hypot(ev.clientX-downX,ev.clientY-downY)>8) moved=true;
  }
  function onUp(ev){
    if(!dragging)return; dragging=false;
    if(moved)return;                       // was rotating
    if(hitMesh(ev)){ react(); speak(cur.say,true); }   // tap body -> loud sound
    else close();                          // tap edge -> disappear
  }
  function react(){ reactAt=performance.now()/1000; sfx("boing"); }

  function open(item, cat){
    ensureAudio();
    if(!ready) init();
    cur=item; behavior = cat.id==="animals"?"hop":(cat.id==="vehicles"?"drive":"spin");
    nameEl.textContent=item.label;
    const col=CARD_COLORS[(Math.random()*CARD_COLORS.length)|0];
    const side=new THREE.MeshStandardMaterial({color:col, roughness:.7, metalness:0});
    const face=new THREE.MeshBasicMaterial({map:makeFaceTexture(item.emoji,col)});
    if(mesh){ scene.remove(mesh); mesh.geometry.dispose(); }
    const geo=new THREE.BoxGeometry(BOX,BOX,1.0);
    mesh=new THREE.Mesh(geo,[side,side,side,side,face,face]); // +x,-x,+y,-y,+z,-z
    scene.add(mesh);
    el.classList.add("show");
    fit(); baseY=0; t0=performance.now()/1000; autoSpin=0;
    speak(item.say,true);                  // announce loud on open
    if(!raf) loop();
  }

  function loop(){
    raf=requestAnimationFrame(loop);
    if(!el.classList.contains("show")||!mesh)return;
    const t=performance.now()/1000 - t0;
    // idle float
    let y=Math.sin(t*2)*0.12, x=0, rz=0;
    if(behavior==="hop"){ y+=Math.abs(Math.sin(t*3))*0.22; rz=Math.sin(t*3)*0.05; }
    else if(behavior==="drive"){ x=Math.sin(t*1.1)*0.7; mesh.rotation.y += (x>=0?1:-1)*0.0; }
    else if(behavior==="spin"){ mesh.rotation.x = Math.sin(t)*0.12; }
    // gentle auto-spin when idle & not dragging
    if(!dragging) mesh.rotation.y += 0.006;
    // tap reaction: quick jump + squash + wiggle
    const rt=performance.now()/1000 - reactAt;
    let sc=1;
    if(rt<0.5){ const p=rt/0.5; y+=Math.sin(p*Math.PI)*0.6; sc=1+Math.sin(p*Math.PI)*0.12; rz+=Math.sin(p*Math.PI*3)*0.12; }
    mesh.position.set(x, baseY+y, 0);
    mesh.rotation.z = rz;
    mesh.scale.setScalar(sc);
    renderer.render(scene,camera);
  }

  function close(){ el.classList.remove("show"); if("speechSynthesis"in window) speechSynthesis.cancel(); }

  document.getElementById("vclose").addEventListener("click", close);
  el.addEventListener("keydown", e=>{ if(e.key==="Escape") close(); });

  return { open, close };
})();

document.getElementById("startBtn").addEventListener("click", ()=>{
  document.getElementById("overlay").classList.add("hidden");
  ensureAudio();
  speak("มาเรียนกันเลย");
});
</script>
