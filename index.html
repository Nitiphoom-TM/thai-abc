<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef6e4">
<title>เรียนรู้พาสนุก 🎈 3D • ก-ฮ • สัตว์ • ยานพาหนะ</title>
<style>
  :root{
    --bg1:#fff7ec; --bg2:#ffe7c7; --bg3:#ffd9e6;
    --card:#ffffff; --ink:#3a2e2a; --muted:#9a8a80;
    --shadow-lg:0 18px 40px -12px rgba(120,80,40,.35);
    --shadow-sm:0 8px 18px -6px rgba(120,80,40,.28);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Sarabun","Kanit","Segoe UI",system-ui,sans-serif;
    color:var(--ink); min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:12px; overflow-x:hidden; position:relative;
    background:
      radial-gradient(1200px 600px at 15% -10%, #fff 0%, transparent 55%),
      radial-gradient(900px 500px at 110% 10%, var(--bg3) 0%, transparent 50%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
  }
  /* floating depth blobs */
  .blob{position:fixed; border-radius:50%; filter:blur(6px); opacity:.35; z-index:0; pointer-events:none;
    animation:float 9s ease-in-out infinite;}
  .blob.b1{width:120px;height:120px;background:#ffd166;top:12%;left:-30px;}
  .blob.b2{width:90px;height:90px;background:#74c0fc;top:60%;right:-20px;animation-delay:-3s;}
  .blob.b3{width:70px;height:70px;background:#8ce99a;bottom:8%;left:10%;animation-delay:-5s;}
  @keyframes float{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(-22px) translateX(10px);}}

  header,main{width:100%; max-width:1120px; position:relative; z-index:1;}
  header{text-align:center;}
  h1{
    font-size:clamp(1.5rem,6vw,2.6rem); margin:.25em 0 .1em; font-weight:800; letter-spacing:.5px;
    color:#5a3d2b; text-shadow:0 2px 0 #fff, 0 4px 10px rgba(180,120,60,.35);
  }
  .subtitle{color:var(--muted); font-size:clamp(.8rem,3.3vw,1rem); margin:0 0 12px;}

  /* ---- chunky 3D tabs ---- */
  .tabs{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:12px;}
  .tab{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(.85rem,3.6vw,1.05rem); padding:11px 20px; border-radius:16px;
    color:#7a5a3a; background:linear-gradient(#ffffff,#ffeccd);
    box-shadow:0 6px 0 #e7c79a, var(--shadow-sm); transition:transform .08s, box-shadow .08s;
    transform:translateZ(0);
  }
  .tab:active{transform:translateY(4px); box-shadow:0 2px 0 #e7c79a, var(--shadow-sm);}
  .tab.active{color:#fff; background:linear-gradient(#ff9bb3,#ff6f91); box-shadow:0 6px 0 #d94f74, var(--shadow-sm);}

  .subtabs{display:flex; gap:10px; justify-content:center; margin-bottom:16px;}
  .subtab{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(.8rem,3.4vw,1rem); padding:9px 20px; border-radius:14px;
    color:#3f6e8c; background:linear-gradient(#ffffff,#e6f2ff);
    box-shadow:0 5px 0 #b7d6f0, var(--shadow-sm); transition:transform .08s, box-shadow .08s;
  }
  .subtab:active{transform:translateY(3px); box-shadow:0 2px 0 #b7d6f0, var(--shadow-sm);}
  .subtab.active{color:#fff; background:linear-gradient(#7db8ff,#4a97dd); box-shadow:0 5px 0 #3877b3, var(--shadow-sm);}

  .cat-panel{display:none;}
  .cat-panel.active{display:block;}
  .mode-panel{display:none; animation:fade .35s ease;}
  .mode-panel.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

  /* ---- home menu (grouped) ---- */
  #home{width:100%; max-width:1120px; margin:0 auto; padding:0 2px 30px; animation:fade .3s ease;}
  #home.hidden{display:none;}
  .group-title{font-weight:800; font-size:clamp(1.1rem,4.5vw,1.5rem); color:#5a3d2b; margin:18px 6px 4px; text-shadow:0 2px 0 #fff;}
  .group-hint{color:var(--muted); font-size:.85rem; margin:0 6px 12px; font-weight:600;}
  .menu-grid{display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .menu-card{
    --c:#ffd166; --e:#e0ad3f; border:none; cursor:pointer; font-family:inherit; border-radius:22px;
    padding:18px 12px; color:#3a2e2a; display:flex; align-items:center; gap:12px; text-align:left;
    background:radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.85), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, var(--c), color-mix(in srgb, var(--c) 80%, #000 3%));
    box-shadow:0 8px 0 var(--e), 0 14px 20px -8px rgba(90,60,30,.4), inset 0 2px 2px rgba(255,255,255,.7);
    transition:transform .1s, box-shadow .1s;
  }
  .menu-card:active{transform:translateY(6px); box-shadow:0 2px 0 var(--e), 0 8px 12px -6px rgba(90,60,30,.4), inset 0 2px 2px rgba(255,255,255,.7);}
  .menu-card .mi{font-size:2.2rem; line-height:1; width:2.6rem; text-align:center; flex:none; font-weight:800;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.15));}
  .menu-card .mt{font-weight:800; font-size:clamp(.95rem,3.8vw,1.15rem); line-height:1.15;}

  /* ---- category bar ---- */
  .catbar{display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .catbar.hidden{display:none;}
  .backbtn{border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:clamp(.85rem,3.6vw,1rem);
    padding:10px 18px; border-radius:14px; color:#7a5a3a; background:linear-gradient(#fff,#ffeccd);
    box-shadow:0 5px 0 #e7c79a, var(--shadow-sm); transition:transform .08s, box-shadow .08s;}
  .backbtn:active{transform:translateY(3px); box-shadow:0 2px 0 #e7c79a, var(--shadow-sm);}
  .subtabs.solo{display:none;}   /* activity categories have no game mode */

  /* ---- cooking game ---- */
  .cooking{width:100%; max-width:640px; margin:0 auto; padding:0 4px 30px; animation:fade .3s ease;}
  .cooking.hidden{display:none;}
  .coins{font-weight:800; font-size:clamp(1.1rem,5vw,1.4rem); color:#a9791f; text-align:center; margin-bottom:8px;}
  .cook-stage{background:linear-gradient(180deg,#ffffff,#fff4e2); border-radius:26px; padding:16px 14px 18px;
    box-shadow:var(--shadow-lg), inset 0 2px 3px rgba(255,255,255,.9); text-align:center; margin-bottom:14px;}
  .pot{min-height:88px; border-radius:20px; background:radial-gradient(120% 80% at 50% 0%, #fff, #ffe7c9);
    box-shadow:inset 0 3px 8px rgba(150,100,50,.25); display:flex; flex-wrap:wrap; gap:6px; align-items:center; justify-content:center;
    padding:12px; font-size:clamp(1.8rem,8vw,2.4rem);}
  .pot .ph{color:var(--muted); font-size:.95rem; font-weight:700;}
  .pot .pi{animation:rpop .4s;}
  .method-pick{margin:10px 0 4px; font-weight:800; color:#6a563f; min-height:1.4em;}
  .cook-actions{display:flex; gap:10px; justify-content:center; margin-top:10px;}
  .cbtn{border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:clamp(1rem,4.5vw,1.25rem);
    padding:14px 22px; border-radius:18px; color:#fff; transition:transform .08s, box-shadow .08s;}
  .cbtn.cook{background:linear-gradient(180deg,#ffb64d,#ff8f1f); box-shadow:0 7px 0 #d9741a, var(--shadow-sm);}
  .cbtn.clear{background:linear-gradient(180deg,#c9b8ac,#a9968a); box-shadow:0 7px 0 #8a7666, var(--shadow-sm);}
  .cbtn.eat{background:linear-gradient(180deg,#8ce99a,#54c96a); box-shadow:0 7px 0 #3ba24f, var(--shadow-sm);}
  .cbtn.sell{background:linear-gradient(180deg,#ffd166,#f2b21f); box-shadow:0 7px 0 #cf9412, var(--shadow-sm); color:#5a3d0b;}
  .cbtn:active{transform:translateY(4px); box-shadow:0 3px 0 rgba(0,0,0,.2), var(--shadow-sm);}
  .result{min-height:10px; margin-top:12px;}
  .result .dish{font-size:clamp(4rem,22vw,6rem); line-height:1; animation:rpop .5s;}
  .result .dname{font-weight:800; font-size:clamp(1.1rem,5vw,1.5rem); color:#5a3d2b; margin-top:4px;}
  .result .dprice{color:#a9791f; font-weight:800; margin-top:2px;}
  .pal-title{font-weight:800; color:#5a3d2b; margin:14px 6px 8px; font-size:clamp(1rem,4.2vw,1.2rem);}
  .ings{display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr)); gap:8px;}
  .methods{display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px;}
  .ing,.meth{border:none; cursor:pointer; font-family:inherit; border-radius:16px; background:linear-gradient(180deg,#fff,#fff2df);
    box-shadow:0 5px 0 #e7c79a, var(--shadow-sm); padding:10px 4px; transition:transform .08s, box-shadow .08s;
    display:flex; flex-direction:column; align-items:center; gap:2px;}
  .ing .ie{font-size:clamp(1.8rem,8vw,2.2rem);} .ing .il{font-size:.62rem; color:var(--muted); font-weight:700;}
  .meth .me{font-size:clamp(1.8rem,8vw,2.2rem);} .meth .ml{font-size:.72rem; color:var(--muted); font-weight:700;}
  .ing:active,.meth:active{transform:translateY(3px); box-shadow:0 2px 0 #e7c79a, var(--shadow-sm);}
  .meth.sel{background:linear-gradient(180deg,#7db8ff,#4a97dd); box-shadow:0 5px 0 #3877b3, var(--shadow-sm);}
  .meth.sel .me, .meth.sel .ml{color:#fff;}

  /* ---- 3D learn grid ---- */
  .grid{
    display:grid; gap:16px 14px; perspective:1000px;
    grid-template-columns:repeat(auto-fill,minmax(104px,1fr));
    padding:6px 2px 30px;
  }
  .card{
    --c:#ffd166; --e:#e0ad3f;
    border:none; cursor:pointer; font-family:inherit; border-radius:22px;
    padding:14px 6px 12px; color:#3a2e2a;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.85), rgba(255,255,255,0) 60%),
      linear-gradient(180deg, var(--c), color-mix(in srgb, var(--c) 78%, #000 4%));
    box-shadow:0 10px 0 var(--e), 0 16px 22px -8px rgba(90,60,30,.45), inset 0 2px 2px rgba(255,255,255,.7);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    transition:transform .1s cubic-bezier(.2,.8,.3,1), box-shadow .1s;
    transform-style:preserve-3d;
  }
  .card:hover{transform:translateY(-3px) rotateX(6deg);}
  .card:active{transform:translateY(7px) rotateX(0);
    box-shadow:0 3px 0 var(--e), 0 8px 12px -6px rgba(90,60,30,.45), inset 0 2px 2px rgba(255,255,255,.7);}
  .card.pop{animation:pop .45s;}
  @keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.14) translateY(-4px);}100%{transform:scale(1);}}
  .card .big{font-size:clamp(2.1rem,9vw,2.7rem); font-weight:800; line-height:1; text-shadow:0 2px 0 rgba(255,255,255,.55);}
  .card .emoji{font-size:clamp(1.9rem,8.5vw,2.7rem); line-height:1; filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));}
  .card .label{font-size:clamp(.72rem,3.2vw,.92rem); font-weight:700; text-align:center; color:#4a3a2e;}

  /* ---- 3D game ---- */
  .game{
    background:linear-gradient(180deg,#ffffff,#fff4e2);
    border-radius:32px; padding:22px 18px 28px; text-align:center; max-width:580px; margin:0 auto;
    box-shadow:var(--shadow-lg), inset 0 2px 3px rgba(255,255,255,.9);
  }
  .score{display:flex; justify-content:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
  .badge{
    min-width:88px; padding:10px 14px; border-radius:18px; font-weight:800;
    background:linear-gradient(180deg,#fff,#ffe9c9); box-shadow:0 6px 0 #ecc891, var(--shadow-sm);
  }
  .badge.streak{background:linear-gradient(180deg,#fff,#ffe0e6); box-shadow:0 6px 0 #f3b9c6, var(--shadow-sm);}
  .badge.best{background:linear-gradient(180deg,#fff,#fff2c2); box-shadow:0 6px 0 #ecd679, var(--shadow-sm);}
  .badge .lbl{font-size:.7rem; color:var(--muted); font-weight:700; display:block; margin-bottom:2px;}
  .badge .v{font-size:clamp(1.2rem,5vw,1.5rem); line-height:1;}
  .prompt{color:var(--muted); font-weight:700; margin:2px 0 8px; font-size:clamp(.9rem,3.8vw,1.05rem);}
  .play-btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(1.1rem,5vw,1.5rem); color:#fff; padding:16px 28px; border-radius:22px;
    background:linear-gradient(180deg,#8fc4ff,#4a97dd);
    box-shadow:0 8px 0 #3877b3, var(--shadow-sm); margin:4px 0 20px;
    transition:transform .08s, box-shadow .08s;
  }
  .play-btn:active{transform:translateY(5px); box-shadow:0 3px 0 #3877b3, var(--shadow-sm);}
  .choices{display:grid; grid-template-columns:1fr 1fr; gap:16px; perspective:1000px;}
  .choice{
    --c:#ffffff; --e:#e7c79a;
    border:none; cursor:pointer; font-family:inherit; border-radius:24px; color:#3a2e2a;
    background:radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%), linear-gradient(180deg,var(--c),#fff2df);
    box-shadow:0 10px 0 var(--e), 0 16px 22px -8px rgba(90,60,30,.4), inset 0 2px 2px rgba(255,255,255,.8);
    padding:20px 8px; display:flex; flex-direction:column; align-items:center; gap:4px;
    min-height:112px; justify-content:center; transition:transform .1s, box-shadow .1s;
    transform-style:preserve-3d;
  }
  .choice:hover{transform:translateY(-3px) rotateX(6deg);}
  .choice:active{transform:translateY(7px); box-shadow:0 3px 0 var(--e), 0 8px 12px -6px rgba(90,60,30,.4), inset 0 2px 2px rgba(255,255,255,.8);}
  .choice .big{font-size:clamp(2.4rem,11vw,3.2rem); font-weight:800; text-shadow:0 2px 0 rgba(255,255,255,.6);}
  .choice .emoji{font-size:clamp(2.2rem,10vw,3rem); filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));}
  .choice.correct{--c:#b6f5c2; --e:#5cc46e; animation:pop .45s;}
  .choice.wrong{--c:#ffc2c2; --e:#e06666;}
  .choice:disabled{cursor:default;}
  .feedback{min-height:32px; font-size:clamp(1.15rem,5vw,1.45rem); font-weight:800; margin-top:16px;}

  footer{color:var(--muted); font-size:.76rem; text-align:center; padding:16px 0 8px; position:relative; z-index:1;}

  /* ---- overlay ---- */
  .overlay{
    position:fixed; inset:0; z-index:60; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center; padding:20px;
    background:radial-gradient(700px 500px at 50% 30%, #fff, var(--bg2));
  }
  .overlay .logo{font-size:4.4rem; filter:drop-shadow(0 8px 10px rgba(0,0,0,.2)); animation:spin3d 4s ease-in-out infinite;}
  @keyframes spin3d{0%,100%{transform:rotateY(0) translateY(0);}50%{transform:rotateY(180deg) translateY(-10px);}}
  .overlay h2{font-size:clamp(1.4rem,6vw,2.1rem); margin:0; color:#5a3d2b; text-shadow:0 2px 0 #fff;}
  .overlay p{color:var(--muted); max-width:340px; margin:0;}
  .start-btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:1.4rem; color:#fff;
    padding:20px 42px; border-radius:26px; background:linear-gradient(180deg,#ff9bb3,#ff6f91);
    box-shadow:0 10px 0 #d94f74, var(--shadow-lg); animation:bounce 1.4s infinite;
  }
  .start-btn:active{transform:translateY(6px); box-shadow:0 4px 0 #d94f74, var(--shadow-lg);}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
  .hidden{display:none !important;}

  /* ---- confetti ---- */
  .confetti{position:fixed; z-index:80; pointer-events:none; font-size:1.6rem; will-change:transform,opacity;}
  @keyframes fall{
    0%{transform:translateY(-10vh) rotate(0); opacity:1;}
    100%{transform:translateY(110vh) rotate(540deg); opacity:0;}
  }

  /* ---- interactive animation viewer ---- */
  .viewer{position:fixed; inset:0; z-index:100; display:none; overflow:hidden; touch-action:manipulation;
    background:radial-gradient(1000px 800px at 50% 32%, #ffffff 0%, #ffe9c9 55%, #ffd9e6 100%);}
  .viewer.show{display:block; animation:fade .25s ease;}
  .viewer .vname{position:absolute; left:0; right:0; top:18px; text-align:center; pointer-events:none; z-index:3;
    font-weight:800; font-size:clamp(1.5rem,7vw,2.4rem); color:#5a3d2b; text-shadow:0 2px 0 #fff, 0 4px 12px rgba(180,120,60,.3);}
  .viewer .vhint{position:absolute; left:0; right:0; bottom:24px; text-align:center; pointer-events:none; z-index:3;
    font-weight:800; font-size:clamp(.85rem,4vw,1.1rem); color:#8a6a48; text-shadow:0 2px 0 #fff; opacity:.9;}
  .viewer .vclose{position:absolute; top:14px; right:16px; z-index:4; width:52px; height:52px; border:none; cursor:pointer;
    border-radius:50%; font-size:1.6rem; color:#fff; background:linear-gradient(180deg,#ff9bb3,#ff6f91);
    box-shadow:0 6px 0 #d94f74, var(--shadow-sm); transition:transform .08s, box-shadow .08s;}
  .viewer .vclose:active{transform:translateY(4px); box-shadow:0 2px 0 #d94f74, var(--shadow-sm);}
  .stage{position:absolute; inset:0; z-index:1;}
  /* ground shadow + hero */
  .hero{position:absolute; left:0; top:0; will-change:transform; cursor:pointer; z-index:2; touch-action:none;}
  .hero .art{display:block; width:44vmin; height:44vmin; pointer-events:none; transform-origin:50% 85%;
    filter:drop-shadow(0 12px 10px rgba(120,80,40,.28)); animation:breathe 2.4s ease-in-out infinite;}
  .hero .art.imgfont{font-size:40vmin; line-height:1; text-align:center; width:auto; height:auto;}
  .hero .shadow{position:absolute; left:50%; bottom:-4vmin; width:26vmin; height:5vmin; transform:translateX(-50%);
    background:radial-gradient(50% 50%, rgba(120,80,40,.28), rgba(120,80,40,0) 70%); z-index:-1; animation:shadowPulse 2.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-1.4vmin) scale(1.03);}}
  @keyframes shadowPulse{0%,100%{transform:translateX(-50%) scale(1); opacity:.85;}50%{transform:translateX(-50%) scale(.8); opacity:.6;}}
  /* reaction animations (applied to .art) */
  .art.jump{animation:rjump .6s cubic-bezier(.3,1.4,.4,1) !important;}
  .art.spin{animation:rspin .7s ease-in-out !important;}
  .art.wobble{animation:rwobble .6s ease-in-out !important;}
  .art.pop{animation:rpop .5s ease-out !important;}
  @keyframes rjump{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-22vmin) scale(1.06,.94);}55%{transform:translateY(-24vmin);}100%{transform:translateY(0) scale(1);}}
  @keyframes rspin{0%{transform:rotate(0) scale(1);}100%{transform:rotate(360deg) scale(1);}}
  @keyframes rwobble{0%,100%{transform:rotate(0);}20%{transform:rotate(-16deg);}40%{transform:rotate(13deg);}60%{transform:rotate(-9deg);}80%{transform:rotate(5deg);}}
  @keyframes rpop{0%{transform:scale(1);}40%{transform:scale(1.35);}100%{transform:scale(1);}}
  /* particle burst */
  .pcl{position:absolute; z-index:5; pointer-events:none; font-size:5vmin; will-change:transform,opacity;}
  @keyframes burst{0%{transform:translate(-50%,-50%) scale(.4); opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.3); opacity:0;}}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<div class="overlay" id="overlay">
  <div class="logo">🎲</div>
  <h2>เรียนรู้พาสนุก</h2>
  <p>แตะปุ่มด้านล่างเพื่อเริ่ม แล้วมาเรียนตัวอักษร ตัวเลข คำศัพท์ และเล่นเกมกันเลย!</p>
  <button class="start-btn" id="startBtn">▶ เริ่มเล่น</button>
</div>

<header>
  <h1 id="appTitle">เรียนรู้พาสนุก 🎈</h1>
  <p class="subtitle" id="appSub">เลือกเมนูที่อยากเรียนได้เลย</p>
  <div id="catbar" class="catbar hidden">
    <button id="backBtn" class="backbtn">← เมนู</button>
    <div class="subtabs" id="subtabs">
      <button class="subtab active" data-mode="learn">📖 เรียนรู้</button>
      <button class="subtab" data-mode="game">🎮 ทายเสียง</button>
    </div>
  </div>
</header>

<div id="home"></div>
<main id="main"></main>
<div id="cooking" class="cooking hidden"></div>

function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
/* short punchy sound effect (loud) */
function sfx(type){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  const o = audioCtx.createOscillator();
  o.connect(g);
  if(type==="pop"){ o.type="triangle"; o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(940,t+.12);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.9,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.22); o.start(t); o.stop(t+.24); }
  else if(type==="boing"){ o.type="sine"; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(660,t+.08); o.frequency.exponentialRampToValueAtTime(180,t+.32);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.9,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.4); o.start(t); o.stop(t+.42); }
  else if(type==="coin"){ o.type="square"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1320,t+.08);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.7,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.3); o.start(t); o.stop(t+.32); }
  else { o.type="square"; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(120,t+.2);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.6,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.25); o.start(t); o.stop(t+.27); }
}

let thaiVoice = null, enVoice = null;
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  thaiVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith("th")) || null;
  enVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith("en")) || null;
}
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, withPop, lang){
  if(withPop) sfx("pop");
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(lang==="en"){ u.lang="en-US"; if(enVoice) u.voice=enVoice; }
  else { u.lang="th-TH"; if(thaiVoice) u.voice=thaiVoice; }
  u.rate=0.85; u.pitch=1.1; u.volume=1;  // loudest
  speechSynthesis.speak(u);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ================= CONFETTI ================= */
function celebrate(big){
  const emojis = big ? ["🌟","🎉","⭐","✨","🏆","🎊"] : ["⭐","✨","🎉","🌟"];
  const n = big ? 26 : 14;
  for(let i=0;i<n;i++){
    const s = document.createElement("div");
    s.className="confetti"; s.textContent=emojis[(Math.random()*emojis.length)|0];
    s.style.left=(Math.random()*100)+"vw";
    s.style.top="-6vh";
    const dur = 1.6+Math.random()*1.4;
    s.style.animation=`fall ${dur}s linear forwards`;
    s.style.fontSize=(1.1+Math.random()*1.4)+"rem";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), dur*1000+100);
  }
}

const games = {};
let activeCat = CATEGORIES[0].id;
let activeMode = "learn";
function bestKey(id){ return "best_"+id; }
function getBest(id){ return parseInt(localStorage.getItem(bestKey(id))||"0",10); }
function setBest(id,v){ localStorage.setItem(bestKey(id), String(v)); }

      </div>

/* ================= GAME LOGIC ================= */
function startRound(catId){
  const g = games[catId]; g.answered=false; g.feedbackEl.textContent="";
  const pool = shuffle(norm[catId]);
  g.current = pool[0];
  const options = shuffle([pool[0],pool[1],pool[2],pool[3]]);
  g.choicesEl.innerHTML="";
  options.forEach(item=>{
    const b=document.createElement("button"); b.className="choice"; b.dataset.key=item.key;
    if(g.cat.type!=="pic"){
      b.innerHTML = `<span class="big">${item.big}</span><span class="emoji" style="font-size:clamp(1.5rem,6vw,2rem)">${item.emoji}</span>`;
    }else{
      b.innerHTML = `<span class="emoji">${item.emoji}</span>`;
    }
    b.addEventListener("click", ()=>choose(catId,b,item));
    g.choicesEl.appendChild(b);
  });
  setTimeout(()=>speak(g.current.say, false, g.cat.lang), 350);
}

function choose(catId, btn, item){
  const g = games[catId];
  if(g.answered || btn.disabled) return;
  const buttons=[...g.choicesEl.children];
  if(item.key === g.current.key){
    g.answered=true; btn.classList.add("correct");
    const gain = 10 + g.streak*2;         // streak bonus
    g.score += gain; g.streak++;
    buttons.forEach(b=>b.disabled=true);
    const prevBest = getBest(catId);
    let newBest=false;
    if(g.score > prevBest){ setBest(catId, g.score); g.bestEl.textContent=g.score; newBest=true; }
    if(newBest && g.score>0 && prevBest>0){
      g.feedbackEl.textContent="ทำลายสถิติ! 🏆 +"+gain;
      celebrate(true); speak("เยี่ยมมาก ทำลายสถิติ");
    }else{
      g.feedbackEl.textContent="เก่งมาก! 🎉 "+g.current.label+"  +"+gain;
      celebrate(false); speak("ถูกต้อง เก่งมาก");
    }
    setTimeout(()=>startRound(catId), 1600);
  }else{
    btn.classList.add("wrong"); btn.disabled=true; g.streak=0;
    g.feedbackEl.textContent="ลองอีกครั้งนะ 💪"; speak("ลอง อีก ครั้ง");
  }
  g.scoreEl.textContent=g.score; g.streakEl.textContent=g.streak;
}

/* ================= NAV ================= */
const catbarEl = document.getElementById("catbar");
const appTitle = document.getElementById("appTitle");
const appSub = document.getElementById("appSub");
const subtabsEl = document.getElementById("subtabs");

function selectCat(catId){
  const cat = CATEGORIES.find(c=>c.id===catId);
  activeCat=catId; activeMode="learn";
  homeEl.classList.add("hidden");
  catbarEl.classList.remove("hidden");
  appTitle.textContent = cat.icon+" "+cat.label;
  appSub.classList.add("hidden");
  document.querySelectorAll(".cat-panel").forEach(p=>p.classList.remove("active"));
  window.scrollTo(0,0);
  if(cat.cooking){                          // cooking game screen
    subtabsEl.style.display="none"; Cooking.open(); return;
  }
  Cooking.close(); subtabsEl.style.display="";
  subtabsEl.classList.toggle("solo", !!cat.activity);   // activity = no game mode
  document.querySelectorAll(".subtab").forEach(x=>x.classList.toggle("active", x.dataset.mode==="learn"));
  document.getElementById("cat-"+catId).classList.add("active");
  applyMode();
}
function goHome(){
  homeEl.classList.remove("hidden");
  catbarEl.classList.add("hidden");
  appTitle.textContent="เรียนรู้พาสนุก 🎈";
  appSub.classList.remove("hidden");
  subtabsEl.style.display="";
  document.querySelectorAll(".cat-panel").forEach(p=>p.classList.remove("active"));
  Cooking.close();
  window.scrollTo(0,0);
}
function applyMode(){
  const panel=document.getElementById("cat-"+activeCat);
  panel.querySelector(".learn").classList.toggle("active", activeMode==="learn");
  panel.querySelector(".game-panel").classList.toggle("active", activeMode==="game");
  if(activeMode==="game"){ const g=games[activeCat]; if(!g.started){ g.started=true; startRound(activeCat); } }
}
document.getElementById("backBtn").addEventListener("click", goHome);
document.querySelectorAll(".subtab").forEach(st=>{
  st.addEventListener("click", ()=>{
    activeMode=st.dataset.mode;
    document.querySelectorAll(".subtab").forEach(x=>x.classList.toggle("active", x===st));
    applyMode();
  });
});

/* ================= INTERACTIVE ANIMATION VIEWER ================= */
const Viewer = (function(){
  const el=document.getElementById("viewer");
  const nameEl=document.getElementById("vname");
  const stage=document.getElementById("stage");
  const hero=document.getElementById("hero");
  const art=document.getElementById("art");
  let cur=null, curLang=null, behavior="bob", raf=null, t0=0;
  let x=0,y=0,vx=0,vy=0, facing=1;
  const ANIMS=["jump","spin","wobble","pop"];
  const PARTS=["⭐","💖","✨","🌟","🎉","💫"];

  function toCodePoint(u){
    const r=[]; let c=0,p=0,i=0;
    while(i<u.length){ c=u.charCodeAt(i++);
      if(p){ r.push((0x10000+((p-0xD800)<<10)+(c-0xDC00)).toString(16)); p=0; }
      else if(0xD800<=c && c<=0xDBFF){ p=c; }
      else r.push(c.toString(16)); }
    return r.join("-");
  }
  function emojiCP(e){ const raw = e.indexOf("‍")<0 ? e.replace(/️/g,"") : e; return toCodePoint(raw); }

  function setArt(emoji, native){
    art.textContent="";
    if(native){ art.classList.add("imgfont"); art.textContent=emoji; return; }  // fingers/text as-is
    art.classList.remove("imgfont");
    const img=new Image();
    img.style.width="100%"; img.style.height="100%"; img.alt="";
    img.onerror=()=>{ art.classList.add("imgfont"); art.textContent=emoji; };
    img.src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/"+emojiCP(emoji)+".svg";
    art.appendChild(img);
  }
  function artPx(){ return 0.44*Math.min(stage.clientWidth, stage.clientHeight); }

  function speed(){ return behavior==="drive"?2.4:(behavior==="hop"?1.6:0.9); }
  function launch(boost){
    const sp=speed()*(boost||1), ang=Math.random()*Math.PI*2;
    vx=Math.cos(ang)*sp;
    vy=Math.sin(ang)*sp*(behavior==="drive"?0.15:(behavior==="hop"?0.45:0.7));
    facing = vx<0?-1:1;
  }

  function particles(){
    const size=artPx(), cx=x+size/2, cy=y+size*0.45;
    for(let i=0;i<9;i++){
      const s=document.createElement("span"); s.className="pcl";
      s.textContent=PARTS[(Math.random()*PARTS.length)|0];
      s.style.left=cx+"px"; s.style.top=cy+"px";
      const ang=Math.random()*Math.PI*2, dist=70+Math.random()*110;
      s.style.setProperty("--dx",(Math.cos(ang)*dist)+"px");
      s.style.setProperty("--dy",(Math.sin(ang)*dist)+"px");
      s.style.animation="burst .8s ease-out forwards";
      stage.appendChild(s);
      setTimeout(()=>s.remove(), 850);
    }
  }

  function heroTap(e){
    e.stopPropagation();
    const a=ANIMS[(Math.random()*ANIMS.length)|0];
    art.classList.remove(...ANIMS); void art.offsetWidth; art.classList.add(a);
    particles();
    sfx("boing"); speak(cur.say, true, curLang);      // loud
    if(Math.random()<0.55) launch(1.7);       // sometimes dart away like it's playing
  }
  art.parentNode.addEventListener("pointerdown", heroTap);
  art.addEventListener("animationend", ()=>{ art.classList.remove(...ANIMS); });

  function loop(){
    raf=requestAnimationFrame(loop);
    if(!el.classList.contains("show")) return;
    const W=stage.clientWidth, H=stage.clientHeight, size=artPx();
    const t=performance.now()/1000 - t0;
    x+=vx; y+=vy;
    const padX=8, topPad=H*0.16, botPad=H*0.14;
    if(x<padX){ x=padX; vx=Math.abs(vx); facing=1; }
    if(x>W-size-padX){ x=W-size-padX; vx=-Math.abs(vx); facing=-1; }
    if(y<topPad){ y=topPad; vy=Math.abs(vy); }
    if(y>H-size-botPad){ y=H-size-botPad; vy=-Math.abs(vy); }
    let hopY=0;
    if(behavior==="hop") hopY=-Math.abs(Math.sin(t*5))*size*0.14;   // little hops
    hero.style.transform=`translate(${x}px,${y+hopY}px) scaleX(${facing})`;
  }

  function open(item, cat){
    ensureAudio();
    cur=item; curLang=cat.lang||null;
    behavior = cat.id==="animals"?"hop":(cat.id==="vehicles"?"drive":(cat.id==="daily"?"hop":"bob"));
    nameEl.textContent=item.label;
    setArt(item.emoji, item.native||cat.native);
    el.classList.add("show");
    const W=stage.clientWidth, H=stage.clientHeight, size=artPx();
    x=(W-size)/2; y=(H-size)/2; launch(1);
    t0=performance.now()/1000;
    art.classList.remove(...ANIMS); void art.offsetWidth; art.classList.add("pop");
    speak(item.say, true, curLang);
    if(!raf) loop();
  }

  function close(){
    el.classList.remove("show");
    if(raf){ cancelAnimationFrame(raf); raf=null; }
    if("speechSynthesis" in window) speechSynthesis.cancel();
  }

  el.addEventListener("pointerdown", close);            // tap background/edge -> close
  document.getElementById("vclose").addEventListener("click", (e)=>{ e.stopPropagation(); close(); });
  window.addEventListener("keydown", e=>{ if(e.key==="Escape" && el.classList.contains("show")) close(); });

  return { open, close };
})();

/* ================= COOKING GAME (free play) ================= */
const Cooking = (function(){
  const el=document.getElementById("cooking");
  let built=false, pot=[], method=null, result=null;
  let coins=parseInt(localStorage.getItem("cook_coins")||"0",10);
  let potEl, methodPickEl, resultEl, coinEl, ingsEl, methodsEl;

  function build(){
    el.innerHTML=`
      <div class="coins">🪙 เหรียญ: <span id="coinv">${coins}</span></div>
      <div class="cook-stage">
        <div class="pot" id="pot"></div>
        <div class="method-pick" id="methodPick"></div>
        <div class="cook-actions">
          <button class="cbtn cook" id="cookBtn">🍳 ปรุง!</button>
          <button class="cbtn clear" id="clearBtn">🗑️ ล้าง</button>
        </div>
        <div class="result" id="result"></div>
      </div>
      <div class="pal-title">🧺 เลือกวัตถุดิบ (แตะใส่หม้อ)</div>
      <div class="ings" id="ings"></div>
      <div class="pal-title">🔧 เลือกวิธีทำ</div>
      <div class="methods" id="methods"></div>`;
    potEl=el.querySelector("#pot"); methodPickEl=el.querySelector("#methodPick");
    resultEl=el.querySelector("#result"); coinEl=el.querySelector("#coinv");
    ingsEl=el.querySelector("#ings"); methodsEl=el.querySelector("#methods");
    COOK_INGS.forEach(ing=>{
      const b=document.createElement("button"); b.className="ing";
      b.innerHTML=`<span class="ie">${ing.e}</span><span class="il">${ing.n}</span>`;
      b.addEventListener("click",()=>addIng(ing)); ingsEl.appendChild(b);
    });
    COOK_METHODS.forEach(mth=>{
      const b=document.createElement("button"); b.className="meth";
      b.innerHTML=`<span class="me">${mth.e}</span><span class="ml">${mth.n}</span>`;
      b.addEventListener("click",()=>pickMethod(mth,b)); methodsEl.appendChild(b);
    });
    el.querySelector("#cookBtn").addEventListener("click",cook);
    el.querySelector("#clearBtn").addEventListener("click",clearAll);
    built=true;
  }
  function renderPot(){
    if(pot.length===0){ potEl.innerHTML=`<span class="ph">ใส่วัตถุดิบลงหม้อได้เลย…</span>`; return; }
    potEl.innerHTML=pot.map(e=>`<span class="pi">${e}</span>`).join("");
  }
  function addIng(ing){ if(pot.length>=6) return; ensureAudio(); sfx("pop"); pot.push(ing.e); renderPot(); }
  function pickMethod(mth,b){
    ensureAudio(); sfx("pop"); method=mth;
    [...methodsEl.children].forEach(x=>x.classList.toggle("sel",x===b));
    methodPickEl.textContent="วิธีทำ: "+mth.n;
  }
  function findRecipe(){
    let best=null;
    COOK_RECIPES.forEach(r=>{
      if(method && r.m!==method.id) return;
      if(r.need.every(x=>pot.includes(x))){ if(!best||r.need.length>best.need.length) best=r; }
    });
    return best;
  }
  function cook(){
    ensureAudio();
    if(pot.length===0){ methodPickEl.textContent="ใส่วัตถุดิบก่อนนะ 😋"; sfx("thud"); return; }
    if(!method){ methodPickEl.textContent="เลือกวิธีทำก่อนนะ 🔧"; sfx("thud"); return; }
    sfx("boing");
    const r=findRecipe();
    result = r ? {e:r.e,n:r.n,price:r.price} : {e:"🍲",n:"จานสร้างสรรค์พิเศษ",price:10+pot.length*8};
    resultEl.innerHTML=`
      <div class="dish">${result.e}</div>
      <div class="dname">${result.n}</div>
      <div class="dprice">ขายได้ 🪙 ${result.price}</div>
      <div class="cook-actions">
        <button class="cbtn eat" id="eatBtn">😋 กิน</button>
        <button class="cbtn sell" id="sellBtn">💰 ขาย</button>
      </div>`;
    speak(result.n, true); celebrate(false);
    resultEl.querySelector("#eatBtn").addEventListener("click",eat);
    resultEl.querySelector("#sellBtn").addEventListener("click",sell);
  }
  function eat(){ sfx("boing"); speak("อร่อยจัง อิ่มแล้ว", true); celebrate(true); clearAll(); }
  function sell(){
    coins+=result.price; localStorage.setItem("cook_coins",String(coins)); coinEl.textContent=coins;
    sfx("coin"); speak("ขายได้ "+result.price+" เหรียญ", true); celebrate(true); clearAll();
  }
  function clearAll(){
    pot=[]; method=null; result=null; renderPot(); if(methodPickEl) methodPickEl.textContent=""; if(resultEl) resultEl.innerHTML="";
    if(methodsEl)[...methodsEl.children].forEach(x=>x.classList.remove("sel"));
  }
  function open(){ ensureAudio(); if(!built) build(); coinEl.textContent=coins; clearAll(); el.classList.remove("hidden"); }
  function close(){ el.classList.add("hidden"); }
  return { open, close };
})();

document.getElementById("startBtn").addEventListener("click", ()=>{
  document.getElementById("overlay").classList.add("hidden");
  ensureAudio();
  speak("มาเรียนกันเลย");
});
</script>
