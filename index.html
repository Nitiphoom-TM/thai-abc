<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef6e4">
<title>ก-ฮ พาสนุก 🎈 เรียนพยัญชนะไทย</title>
<style>
  :root{
    --bg1:#fff9f0; --bg2:#fdeecf; --card:#ffffff;
    --ink:#3a2e2a; --muted:#8a7b72;
    --pink:#ff8fab; --yellow:#ffd166; --green:#8ce99a;
    --blue:#74c0fc; --purple:#b197fc; --orange:#ffa94d;
    --shadow:0 6px 0 rgba(0,0,0,.08), 0 10px 24px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Sarabun","Kanit","Segoe UI",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--ink); min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:12px; overflow-x:hidden;
  }
  header{text-align:center; width:100%; max-width:1100px;}
  h1{
    font-size:clamp(1.5rem,6vw,2.6rem); margin:.3em 0 .1em;
    font-weight:800; letter-spacing:.5px;
    background:linear-gradient(90deg,var(--pink),var(--orange),var(--blue));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{color:var(--muted); font-size:clamp(.85rem,3.5vw,1.05rem); margin:0 0 10px;}

  /* Tabs */
  .tabs{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:14px;}
  .tab{
    border:none; cursor:pointer; font-family:inherit; font-weight:700;
    font-size:clamp(.9rem,3.8vw,1.1rem); padding:10px 20px; border-radius:999px;
    background:var(--card); color:var(--muted); box-shadow:var(--shadow);
    transition:transform .1s, background .2s, color .2s;
  }
  .tab.active{background:linear-gradient(90deg,var(--pink),var(--orange)); color:#fff;}
  .tab:active{transform:scale(.94);}

  main{width:100%; max-width:1100px; flex:1;}
  .panel{display:none; animation:fade .3s ease;}
  .panel.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  /* Learn grid */
  .grid{
    display:grid; gap:10px;
    grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
    padding-bottom:24px;
  }
  .letter{
    background:var(--card); border:none; border-radius:20px; cursor:pointer;
    padding:12px 6px 10px; box-shadow:var(--shadow); font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transition:transform .08s; position:relative; overflow:hidden;
  }
  .letter:active{transform:scale(.92);}
  .letter.pop{animation:pop .4s;}
  @keyframes pop{0%{transform:scale(1);}30%{transform:scale(1.12);}100%{transform:scale(1);}}
  .letter .big{font-size:clamp(2rem,9vw,2.6rem); font-weight:800; line-height:1; color:var(--ink);}
  .letter .emoji{font-size:clamp(1.5rem,7vw,2rem); line-height:1;}
  .letter .word{font-size:clamp(.7rem,3.2vw,.85rem); color:var(--muted); font-weight:600;}
  .letter:nth-child(6n+1){background:linear-gradient(160deg,#fff,#fff0f3);}
  .letter:nth-child(6n+2){background:linear-gradient(160deg,#fff,#fff8e6);}
  .letter:nth-child(6n+3){background:linear-gradient(160deg,#fff,#eefdf0);}
  .letter:nth-child(6n+4){background:linear-gradient(160deg,#fff,#eef7ff);}
  .letter:nth-child(6n+5){background:linear-gradient(160deg,#fff,#f5f0ff);}
  .letter:nth-child(6n+6){background:linear-gradient(160deg,#fff,#fff2e6);}

  /* Game */
  .game{
    background:var(--card); border-radius:28px; box-shadow:var(--shadow);
    padding:22px 18px 26px; text-align:center; max-width:560px; margin:0 auto;
  }
  .score{display:flex; justify-content:space-around; margin-bottom:14px; font-weight:800;}
  .score .s{font-size:clamp(1rem,4.5vw,1.3rem);}
  .score .lbl{font-size:.75rem; color:var(--muted); font-weight:600; display:block;}
  .play-btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:clamp(1.1rem,5vw,1.5rem); color:#fff; padding:18px 26px;
    border-radius:22px; background:linear-gradient(160deg,var(--blue),var(--purple));
    box-shadow:var(--shadow); margin:6px 0 18px; transition:transform .1s;
  }
  .play-btn:active{transform:scale(.94);}
  .choices{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .choice{
    border:none; cursor:pointer; font-family:inherit; border-radius:20px;
    background:linear-gradient(160deg,#fff,#fff6e9); box-shadow:var(--shadow);
    padding:16px 8px; display:flex; flex-direction:column; align-items:center; gap:4px;
    transition:transform .08s;
  }
  .choice:active{transform:scale(.93);}
  .choice .big{font-size:clamp(2.2rem,10vw,3rem); font-weight:800;}
  .choice .emoji{font-size:clamp(1.8rem,8vw,2.4rem);}
  .choice.correct{background:linear-gradient(160deg,#d3f9d8,#8ce99a); animation:pop .4s;}
  .choice.wrong{background:linear-gradient(160deg,#ffe3e3,#ffa8a8);}
  .choice:disabled{cursor:default;}
  .feedback{min-height:30px; font-size:clamp(1.1rem,5vw,1.4rem); font-weight:800; margin-top:14px;}
  .hint{color:var(--muted); font-size:.9rem; margin:8px 0 0;}

  footer{color:var(--muted); font-size:.78rem; text-align:center; padding:16px 0 8px;}

  /* Sound enable overlay */
  .overlay{
    position:fixed; inset:0; background:rgba(255,249,240,.96);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:50; text-align:center; padding:20px;
  }
  .overlay h2{font-size:clamp(1.3rem,6vw,2rem); margin:0;}
  .overlay p{color:var(--muted); max-width:340px; margin:0;}
  .start-btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:1.4rem; color:#fff; padding:20px 40px; border-radius:24px;
    background:linear-gradient(160deg,var(--pink),var(--orange)); box-shadow:var(--shadow);
    animation:bounce 1.4s infinite;
  }
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div style="font-size:4rem">🎈🔊</div>
  <h2>ก-ฮ พาสนุก</h2>
  <p>แตะปุ่มด้านล่างเพื่อเริ่ม แล้วมาเรียนพยัญชนะไทยกันเลย!</p>
  <button class="start-btn" id="startBtn">▶ เริ่มเล่น</button>
</div>

<header>
  <h1>ก-ฮ พาสนุก 🎈</h1>
  <p class="subtitle">แตะตัวอักษรเพื่อฟังเสียง แล้วลองเล่นเกมทายเสียงกัน!</p>
  <div class="tabs">
    <button class="tab active" data-tab="learn">📖 เรียนรู้</button>
    <button class="tab" data-tab="game">🎮 เกมทายเสียง</button>
  </div>
</header>

<main>
  <section class="panel active" id="learn">
    <div class="grid" id="grid"></div>
  </section>

  <section class="panel" id="game">
    <div class="game">
      <div class="score">
        <div class="s"><span class="lbl">คะแนน</span><span id="score">0</span></div>
        <div class="s"><span class="lbl">ถูกติดต่อกัน</span><span id="streak">0</span> 🔥</div>
      </div>
      <button class="play-btn" id="playBtn">🔊 ฟังเสียงอีกครั้ง</button>
      <p class="hint">ฟังเสียงแล้วเลือกตัวอักษรที่ถูกต้อง</p>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </section>
</main>

<footer>สร้างเพื่อการเรียนรู้ • ใช้เสียงในเครื่อง (Web Speech) • เปิดได้ทุกอุปกรณ์</footer>

<script>
const LETTERS = [
  {c:"ก", w:"ไก่", e:"🐔", say:"กอ ไก่"},
  {c:"ข", w:"ไข่", e:"🥚", say:"ขอ ไข่"},
  {c:"ฃ", w:"ขวด", e:"🍶", say:"ขอ ขวด"},
  {c:"ค", w:"ควาย", e:"🐃", say:"คอ ควาย"},
  {c:"ฅ", w:"คน", e:"🧑", say:"คอ คน"},
  {c:"ฆ", w:"ระฆัง", e:"🔔", say:"คอ ระฆัง"},
  {c:"ง", w:"งู", e:"🐍", say:"งอ งู"},
  {c:"จ", w:"จาน", e:"🍽️", say:"จอ จาน"},
  {c:"ฉ", w:"ฉิ่ง", e:"🎶", say:"ฉอ ฉิ่ง"},
  {c:"ช", w:"ช้าง", e:"🐘", say:"ชอ ช้าง"},
  {c:"ซ", w:"โซ่", e:"⛓️", say:"ซอ โซ่"},
  {c:"ฌ", w:"เฌอ", e:"🌳", say:"ชอ เฌอ"},
  {c:"ญ", w:"หญิง", e:"👧", say:"ยอ หญิง"},
  {c:"ฎ", w:"ชฎา", e:"👑", say:"ดอ ชฎา"},
  {c:"ฏ", w:"ปฏัก", e:"🔱", say:"ตอ ปะ ตัก"},
  {c:"ฐ", w:"ฐาน", e:"🛕", say:"ถอ ถาน"},
  {c:"ฑ", w:"มณโฑ", e:"👸", say:"ทอ มน โท"},
  {c:"ฒ", w:"ผู้เฒ่า", e:"👴", say:"ทอ ผู้ เฒ่า"},
  {c:"ณ", w:"เณร", e:"🧑‍🦲", say:"นอ เนน"},
  {c:"ด", w:"เด็ก", e:"👶", say:"ดอ เด็ก"},
  {c:"ต", w:"เต่า", e:"🐢", say:"ตอ เต่า"},
  {c:"ถ", w:"ถุง", e:"🛍️", say:"ถอ ถุง"},
  {c:"ท", w:"ทหาร", e:"💂", say:"ทอ ทะ หาน"},
  {c:"ธ", w:"ธง", e:"🚩", say:"ทอ ทง"},
  {c:"น", w:"หนู", e:"🐭", say:"นอ หนู"},
  {c:"บ", w:"ใบไม้", e:"🍃", say:"บอ ใบ ไม้"},
  {c:"ป", w:"ปลา", e:"🐟", say:"ปอ ปลา"},
  {c:"ผ", w:"ผึ้ง", e:"🐝", say:"ผอ ผึ้ง"},
  {c:"ฝ", w:"ฝา", e:"🧴", say:"ฝอ ฝา"},
  {c:"พ", w:"พาน", e:"🏺", say:"พอ พาน"},
  {c:"ฟ", w:"ฟัน", e:"🦷", say:"ฟอ ฟัน"},
  {c:"ภ", w:"สำเภา", e:"⛵", say:"พอ สำ เพา"},
  {c:"ม", w:"ม้า", e:"🐴", say:"มอ ม้า"},
  {c:"ย", w:"ยักษ์", e:"👹", say:"ยอ ยัก"},
  {c:"ร", w:"เรือ", e:"🚣", say:"รอ เรือ"},
  {c:"ล", w:"ลิง", e:"🐒", say:"ลอ ลิง"},
  {c:"ว", w:"แหวน", e:"💍", say:"วอ แหวน"},
  {c:"ศ", w:"ศาลา", e:"🏯", say:"สอ สา ลา"},
  {c:"ษ", w:"ฤๅษี", e:"🧙", say:"สอ รือ สี"},
  {c:"ส", w:"เสือ", e:"🐅", say:"สอ เสือ"},
  {c:"ห", w:"หีบ", e:"📦", say:"หอ หีบ"},
  {c:"ฬ", w:"จุฬา", e:"🪁", say:"ลอ จุ ลา"},
  {c:"อ", w:"อ่าง", e:"🛁", say:"ออ อ่าง"},
  {c:"ฮ", w:"นกฮูก", e:"🦉", say:"ฮอ นก ฮูก"},
];

/* ---------- Speech ---------- */
let thaiVoice = null;
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  thaiVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith("th")) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "th-TH";
  if(thaiVoice) u.voice = thaiVoice;
  u.rate = 0.85; u.pitch = 1.05;
  speechSynthesis.speak(u);
}

/* ---------- Overlay / start ---------- */
const overlay = document.getElementById("overlay");
document.getElementById("startBtn").addEventListener("click", ()=>{
  overlay.classList.add("hidden");
  speak("มาเรียน ก ไก่ กันเลย"); // unlock audio on user gesture
});

/* ---------- Tabs ---------- */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
    if(tab.dataset.tab === "game" && !gameStarted){ startRound(); gameStarted = true; }
  });
});

/* ---------- Learn grid ---------- */
const grid = document.getElementById("grid");
LETTERS.forEach(L=>{
  const b = document.createElement("button");
  b.className = "letter";
  b.innerHTML = `<span class="emoji">${L.e}</span><span class="big">${L.c}</span><span class="word">${L.c} ${L.w}</span>`;
  b.addEventListener("click", ()=>{
    b.classList.remove("pop"); void b.offsetWidth; b.classList.add("pop");
    speak(L.say);
  });
  grid.appendChild(b);
});

/* ---------- Game ---------- */
let score = 0, streak = 0, current = null, gameStarted = false, answered = false;
const scoreEl = document.getElementById("score");
const streakEl = document.getElementById("streak");
const choicesEl = document.getElementById("choices");
const feedbackEl = document.getElementById("feedback");
const playBtn = document.getElementById("playBtn");

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]];} return a; }

function startRound(){
  answered = false;
  feedbackEl.textContent = "";
  const pool = shuffle(LETTERS);
  current = pool[0];
  const options = shuffle([current, pool[1], pool[2], pool[3]]);
  choicesEl.innerHTML = "";
  options.forEach(L=>{
    const b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = `<span class="big">${L.c}</span><span class="emoji">${L.e}</span>`;
    b.addEventListener("click", ()=>choose(b, L));
    choicesEl.appendChild(b);
  });
  setTimeout(()=>speak(current.say), 350);
}

function choose(btn, L){
  if(answered || btn.disabled) return;
  const buttons = [...choicesEl.children];
  if(L.c === current.c){
    answered = true;
    btn.classList.add("correct");
    score++; streak++;
    feedbackEl.textContent = "เก่งมาก! 🎉 " + current.c + " " + current.w;
    speak("ถูกต้อง เก่งมาก");
    buttons.forEach(b=>b.disabled=true);
    setTimeout(startRound, 1400);
  }else{
    // wrong: mark this choice, let the child try again
    btn.classList.add("wrong");
    btn.disabled = true;
    streak = 0;
    feedbackEl.textContent = "ลองอีกครั้งนะ 💪";
    speak("ลอง อีก ครั้ง");
  }
  scoreEl.textContent = score;
  streakEl.textContent = streak;
}

playBtn.addEventListener("click", ()=>{ if(current) speak(current.say); });
</script>
</body>
</html>
